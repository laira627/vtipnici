<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vtipníci</title>
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
<style>
  :root {
    --bg: #dceefb;
    --paper: #ffffff;
    --panel: #f7fafd;
    --ink: #2b2620;
    --ink-soft: #6b6155;
    --line: #e3e9ef;
    --accent: #3d6fa8;
    --accent-soft: #e5eefa;
    --accent-dark: #2c527f;
    --shadow: 0 1px 3px rgba(43,38,32,0.06), 0 4px 16px rgba(43,38,32,0.05);
    --danger: #b3261e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  input, select, textarea, button { font-family: inherit; }

  /* ---------- Login ---------- */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: var(--paper);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .login-card h1 { font-size: 26px; margin: 0 0 6px; font-weight: 700; }
  .login-card p.sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 28px; }
  .field { text-align: left; margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink-soft); }
  input[type=email], input[type=password], input[type=date], input[type=text], select {
    width: 100%;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    font-size: 15px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--accent); color: #fff; border: none; padding: 12px 20px;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .1s; width: 100%;
  }
  .btn:hover { background: var(--accent-dark); }
  .btn:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: var(--ink-soft); border: 1.5px solid var(--line); }
  .btn-secondary:hover { background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent-soft); }
  #loginError { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* ---------- App shell ---------- */
  #app { display: none; height: 100vh; }
  #app.visible { display: block; }

  .columns {
    display: grid;
    grid-template-columns: 230px 320px 1fr;
    height: 100vh;
  }

  .col { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .col-folders { background: var(--panel); border-right: 1px solid var(--line); }
  .col-notes { background: var(--paper); border-right: 1px solid var(--line); }
  .col-editor { background: var(--paper); }

  .col-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }
  .col-head h2 { font-size: 15px; margin: 0; font-weight: 700; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
  .head-actions { display: flex; align-items: center; gap: 4px; }

  .icon-btn {
    background: transparent; border: 1.5px solid var(--line); color: var(--ink-soft);
    border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .icon-btn:hover { background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent-soft); }
  .icon-btn.small { padding: 5px 8px; font-size: 15px; }
  #editorFavBtn.active { color: #e0a733; border-color: #e0a733; background: rgba(224,167,51,0.12); }

  /* ---------- Folders column ---------- */
  .folders-list { flex: 1; overflow-y: auto; padding: 10px 8px; }
  .folder-section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--ink-soft); font-weight: 700; padding: 12px 8px 6px;
  }
  .folder-row {
    display: flex; align-items: center; gap: 9px; padding: 9px 10px;
    border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: 600;
    color: var(--ink); margin-bottom: 2px; position: relative;
  }
  .folder-row:hover { background: var(--accent-soft); }
  .folder-row.active { background: var(--accent); color: #fff; }
  .folder-row.active .folder-count { color: rgba(255,255,255,0.8); }
  .folder-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.08); }
  .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .folder-count { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
  .folder-tools {
    display: none; gap: 3px; position: absolute; right: 6px; background: inherit;
  }
  .folder-row:hover .folder-tools { display: flex; }
  .folder-row.active .folder-tools { display: flex; }
  .folder-tool-btn {
    background: rgba(255,255,255,0.5); border: none; border-radius: 5px; cursor: pointer;
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px;
  }
  .folder-row.active .folder-tool-btn { background: rgba(255,255,255,0.25); color: #fff; }
  .folder-color-input { position: absolute; opacity: 0; width: 20px; height: 20px; left: 0; top: 0; cursor: pointer; }
  .folder-name-input {
    flex: 1; border: none; background: rgba(255,255,255,0.6); border-radius: 5px;
    font-size: 14px; font-weight: 600; padding: 3px 6px; color: var(--ink); outline: 1.5px solid var(--accent);
  }

  .add-folder-panel { padding: 10px 16px 14px; border-top: 1px solid var(--line); display: none; }
  .add-folder-panel.visible { display: block; }
  .add-folder-panel .row { display: flex; gap: 6px; margin-bottom: 8px; }
  .add-folder-panel input[type=text] { flex: 1; }
  .add-folder-panel input[type=color] { width: 38px; height: 38px; padding: 2px; border-radius: 8px; border: 1.5px solid var(--line); cursor: pointer; }
  .add-folder-panel .row-btns { display: flex; gap: 8px; }
  .add-folder-panel .row-btns .btn { padding: 9px; font-size: 13px; }

  .col-footer { padding: 10px 16px; border-top: 1px solid var(--line); display: flex; gap: 6px; }
  .col-footer .icon-btn { flex: 1; justify-content: center; }

  /* ---------- Notes column ---------- */
  .search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--line); }
  .search-wrap input {
    width: 100%; padding: 9px 12px; border-radius: 9px; border: 1.5px solid var(--line);
    font-size: 14px; background: var(--panel); outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); background: #fff; }
  .search-box { position: relative; }
  .search-box input { padding-right: 34px; }
  .search-clear-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; cursor: pointer; color: var(--ink-soft);
    font-size: 17px; line-height: 1; padding: 5px 7px; border-radius: 7px; display: none;
  }
  .search-clear-btn.visible { display: block; }
  .search-clear-btn:hover { background: var(--accent-soft); color: var(--accent-dark); }

  .notes-list { flex: 1; overflow-y: auto; padding: 8px; }
  .note-row {
    background: var(--paper); border: 1px solid var(--line); border-left-width: 4px;
    border-radius: 10px; padding: 11px 12px; margin-bottom: 8px; cursor: pointer; position: relative;
  }
  .note-row.active { background: var(--accent-soft); border-color: var(--accent); }
  .note-row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; padding-right: 26px; }
  .note-row-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .note-row-meta { font-size: 12px; color: var(--ink-soft); display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
  .note-row-snippet { font-size: 12.5px; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .note-row-badge {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; flex-shrink: 0;
  }
  .note-row-star { background: transparent; border: none; cursor: pointer; font-size: 14px; color: #d8cfc2; flex-shrink: 0; }
  .note-row-star.active { color: #e0a733; }
  .note-row-del {
    position: absolute; top: 8px; right: 8px; background: transparent; border: none; color: var(--ink-soft);
    cursor: pointer; display: none; font-size: 13px; padding: 3px 6px; border-radius: 6px;
  }
  .note-row:hover .note-row-del { display: block; }
  .note-row:hover .note-row-del:hover { background: #fce8e6; color: var(--danger); }
  .empty-state { text-align: center; color: var(--ink-soft); padding: 40px 20px; font-size: 13.5px; }

  /* ---------- Tag pills ---------- */
  .note-row-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag-pill {
    font-size: 10.5px; font-weight: 600; background: var(--accent-soft); color: var(--accent-dark);
    padding: 2px 8px; border-radius: 999px; white-space: nowrap;
  }

  /* ---------- Editor column ---------- */
  .editor-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); font-size: 14px; text-align: center; padding: 40px;
  }
  .editor-wrap { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .editor-wrap.visible { display: flex; }

  .editor-topbar {
    padding: 12px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .editor-topbar select { max-width: 150px; padding: 7px 9px; font-size: 13px; }
  .editor-topbar input[type=date] { padding: 7px 9px; font-size: 13px; max-width: 145px; }
  .editor-topbar .spacer { flex: 1; }

  .editor-title-row { padding: 16px 20px 0; }
  #editorTitle {
    width: 100%; border: none; outline: none; font-size: 24px; font-weight: 700;
    color: var(--ink); background: transparent; padding: 0 0 12px;
  }
  #editorTitle::placeholder { color: #c8bfae; }

  .editor-tags-row {
    padding: 0 20px 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  }
  .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 600;
    background: var(--accent-soft); color: var(--accent-dark); padding: 4px 6px 4px 10px; border-radius: 999px;
  }
  .tag-chip button {
    background: transparent; border: none; cursor: pointer; color: inherit; font-size: 13px;
    line-height: 1; padding: 0 2px; opacity: .7;
  }
  .tag-chip button:hover { opacity: 1; }
  #tagInput {
    border: none; outline: none; background: transparent; font-size: 13px; color: var(--ink-soft);
    min-width: 120px; padding: 4px 2px;
  }

  #quillContainer { flex: 1; overflow-y: auto; border: none !important; }
  .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid var(--line) !important; padding: 8px 20px !important; }
  .ql-container.ql-snow { border: none !important; font-size: 15px; }
  .ql-editor { padding: 16px 20px 40px; min-height: 200px; }
  .ql-editor.ql-blank::before { color: #c8bfae; font-style: normal; }

  .editor-statusbar {
    padding: 8px 20px; border-top: 1px solid var(--line); font-size: 12px; color: var(--ink-soft);
    display: flex; justify-content: space-between; flex-shrink: 0;
  }

  .editor-import-row {
    padding: 0 20px 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  }
  .editor-import-row input[type=url] {
    flex: 1; min-width: 160px; padding: 8px 11px; border-radius: 9px; border: 1.5px solid var(--line);
    font-size: 13px; background: var(--panel); outline: none; color: var(--ink);
  }
  .editor-import-row input[type=url]:focus { border-color: var(--accent); background: #fff; }
  .editor-import-row .icon-btn { flex-shrink: 0; }
  #importStatus { font-size: 12px; color: var(--ink-soft); flex-shrink: 0; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(43,38,32,0.35);
    align-items: center; justify-content: center; z-index: 300; padding: 20px;
  }
  .modal-overlay.visible { display: flex; }
  .modal-card {
    background: var(--paper); border-radius: 16px; padding: 24px; width: 100%; max-width: 340px;
    box-shadow: var(--shadow);
  }
  .modal-card h3 { margin: 0 0 6px; font-size: 17px; }
  .modal-card .modal-sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 16px; }
  .modal-card .row-btns { display: flex; gap: 8px; margin-top: 6px; }
  .modal-card .row-btns .btn { padding: 10px; font-size: 14px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; z-index: 200;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(-6px); pointer-events: auto; }
  .toast-undo-btn {
    background: transparent; border: 1.5px solid rgba(255,255,255,0.5); color: #fff;
    border-radius: 7px; padding: 4px 11px; font-size: 12.5px; font-weight: 700; cursor: pointer;
    white-space: nowrap;
  }
  .toast-undo-btn:hover { background: rgba(255,255,255,0.18); }

  /* ---------- Print ---------- */
  #printArea { display: none; }
  @media print {
    body.printing > *:not(#printArea) { display: none !important; }
    #printArea { display: block !important; padding: 20px; }
    .print-note { page-break-inside: avoid; margin-bottom: 26px; }
    .print-title { font-size: 20px; font-weight: 700; margin: 0 0 2px; }
    .print-meta { font-size: 12px; color: #555; margin-bottom: 10px; }
    .print-folder-title { font-size: 26px; margin-bottom: 20px; }
    .print-content img { max-width: 100%; }
  }

  /* ---------- Dashboard ---------- */
  .columns.dashboard-mode { grid-template-columns: 230px 1fr; }
  .columns.dashboard-mode .col-editor { display: none; }
  .dashboard-group { margin-bottom: 20px; }
  .dashboard-group-label {
    display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft);
    margin: 6px 4px 8px;
  }
  .dashboard-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .dashboard-tile { flex: 1 1 180px; max-width: 280px; margin-bottom: 0; }

  /* ---------- Mobile ---------- */
  .back-btn { display: none; }
  @media (max-width: 900px) {
    .columns { grid-template-columns: 100%; }
    .col { display: none; height: 100vh; }
    .columns[data-view="folders"] .col-folders { display: flex; }
    .columns[data-view="notes"] .col-notes { display: flex; }
    .columns[data-view="editor"] .col-editor { display: flex; }
    .back-btn { display: inline-flex; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>📓 Vtipníci</h1>
    <p class="sub">Osobní zápisník hlášek, filmů, knih a myšlenek</p>
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="loginPassword">Heslo</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Přihlásit se</button>
      <div id="loginError"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="columns" id="columns" data-view="folders">

    <!-- FOLDERS COLUMN -->
    <div class="col col-folders">
      <div class="col-head">
        <div class="brand">📓 Vtipníci</div>
        <div class="head-actions">
          <button class="icon-btn small" id="jsonExportBtn" title="Záloha JSON" aria-label="Záloha JSON">⬇</button>
          <button class="icon-btn small" id="logoutBtn" title="Odhlásit" aria-label="Odhlásit">⏻</button>
        </div>
      </div>
      <div class="folders-list" id="foldersList"></div>
      <div class="add-folder-panel" id="addFolderPanel">
        <div class="row">
          <input type="text" id="newFolderName" placeholder="Název složky">
          <input type="color" id="newFolderColor" value="#3d6fa8">
        </div>
        <div class="row-btns">
          <button class="btn btn-secondary" id="cancelFolderBtn">Zrušit</button>
          <button class="btn" id="saveFolderBtn">Přidat</button>
        </div>
      </div>
      <div class="col-footer">
        <button class="icon-btn" id="addFolderBtn">＋ Nová složka</button>
      </div>
    </div>

    <!-- NOTES COLUMN -->
    <div class="col col-notes">
      <div class="col-head">
        <button class="icon-btn small back-btn" id="backToFolders" aria-label="Zpět na složky">←</button>
        <h2 id="notesColTitle">Všechny poznámky</h2>
        <div class="head-actions">
          <button class="icon-btn small" id="exportPdfBtn" title="Export do PDF" aria-label="Export do PDF">🖨</button>
          <button class="icon-btn small" id="newNoteBtn" title="Nová poznámka" aria-label="Nová poznámka">＋</button>
        </div>
      </div>
      <div class="search-wrap">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Hledat v poznámkách i štítcích…">
          <button class="search-clear-btn" id="searchClearBtn" type="button" title="Vymazat hledání" aria-label="Vymazat hledání">×</button>
        </div>
      </div>
      <div class="notes-list" id="notesList">
        <div class="empty-state">Načítám…</div>
      </div>
    </div>

    <!-- EDITOR COLUMN -->
    <div class="col col-editor">
      <div class="editor-empty" id="editorEmpty">Vyber poznámku vlevo, nebo vytvoř novou.</div>
      <div class="editor-wrap" id="editorWrap">
        <div class="editor-topbar">
          <button class="icon-btn small back-btn" id="backToNotes" aria-label="Zpět na poznámky">←</button>
          <select id="editorFolder"></select>
          <input type="date" id="editorDate">
          <div class="spacer"></div>
          <button class="icon-btn small" id="editorFavBtn" title="Oblíbené" aria-label="Oblíbené">★</button>
          <button class="icon-btn small" id="editorDeleteBtn" title="Smazat poznámku" aria-label="Smazat poznámku">🗑</button>
        </div>
        <div class="editor-title-row">
          <input type="text" id="editorTitle" placeholder="Název poznámky">
        </div>
        <div class="editor-tags-row" id="editorTagsRow">
          <div class="tag-chips" id="tagChips"></div>
          <input type="text" id="tagInput" placeholder="+ štítek (Enter)">
        </div>
        <div class="editor-import-row" id="editorImportRow">
          <input type="url" id="importUrlInput" placeholder="Vlož odkaz na recept / stránku…">
          <button class="icon-btn small" id="importUrlBtn" type="button" title="Načíst text ze stránky" aria-label="Načíst text ze stránky">🌐 Načíst z webu</button>
          <span id="importStatus"></span>
        </div>
        <div id="quillContainer"></div>
        <div class="editor-statusbar">
          <span id="saveStatus">Uloženo</span>
          <span id="editedStatus"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="pdfRangeModal">
  <div class="modal-card">
    <h3>Export do PDF</h3>
    <p class="modal-sub">Nech pole prázdná pro export všech poznámek v aktuálním pohledu.</p>
    <div class="field">
      <label for="pdfFromDate">Od</label>
      <input type="date" id="pdfFromDate">
    </div>
    <div class="field">
      <label for="pdfToDate">Do</label>
      <input type="date" id="pdfToDate">
    </div>
    <div class="row-btns">
      <button class="btn btn-secondary" id="pdfCancelBtn" type="button">Zrušit</button>
      <button class="btn" id="pdfConfirmBtn" type="button">Exportovat</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
    collection, addDoc, updateDoc, deleteDoc, doc,
    query, where, orderBy, onSnapshot, serverTimestamp, writeBatch, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCeOsvSECUhxjCQ7y2fFv3ybkxw2vsHwEo",
    authDomain: "vtipnici.firebaseapp.com",
    projectId: "vtipnici",
    storageBucket: "vtipnici.firebasestorage.app",
    messagingSenderId: "803980056829",
    appId: "1:803980056829:web:1358b51db8b3e706e50694"
  };

  const app = initializeApp(firebaseConfig);

  function showToast(msg) {
    clearTimeout(undoToastTimer);
    toast.innerHTML = "";
    toast.textContent = msg;
    toast.classList.add("visible");
    setTimeout(() => toast.classList.remove("visible"), 2200);
  }

  function showUndoToast(msg, onUndo) {
    clearTimeout(undoToastTimer);
    toast.innerHTML = "";
    const msgSpan = document.createElement("span");
    msgSpan.textContent = msg;
    const undoBtn = document.createElement("button");
    undoBtn.type = "button";
    undoBtn.className = "toast-undo-btn";
    undoBtn.textContent = "Zpět";
    toast.appendChild(msgSpan);
    toast.appendChild(undoBtn);
    toast.classList.add("visible");
    const hide = () => { toast.classList.remove("visible"); toast.innerHTML = ""; };
    undoBtn.addEventListener("click", () => {
      onUndo();
      clearTimeout(undoToastTimer);
      hide();
    });
    undoToastTimer = setTimeout(hide, 5000);
  }

  function visibleNotes() {
    return allNotes.filter(n => !pendingDeletes.has(n.id));
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function stripHtml(html) {
    if (!html) return "";
    const d = document.createElement("div");
    d.innerHTML = html;
    return (d.textContent || "").trim();
  }

  function formatDate(isoDate) {
    if (!isoDate) return "";
    const [y,m,d] = isoDate.split("-");
    return `${d}.${m}.${y}`;
  }

  function folderByName(nazev) {
    return folders.find(f => f.nazev === nazev);
  }

  // ---------- Quill init ----------
  function initQuill() {
    if (quill) return;
    const toolbarOptions = [
      [{ header: [1, 2, 3, false] }],
      ["bold", "italic", "underline", "strike"],
      [{ color: [] }, { background: [] }],
      [{ list: "ordered" }, { list: "bullet" }, { list: "check" }],
      ["code-block", "link", "image"],
      ["clean"]
    ];
    quill = new Quill("#quillContainer", {
      theme: "snow",
      placeholder: "Začni psát…",
      modules: {
        toolbar: {
          container: toolbarOptions,
          handlers: { image: handleImageInsert }
        }
      }
    });
    quill.on("text-change", (delta, oldDelta, source) => {
      if (source === "user" && !suppressAutosave) scheduleSave();
    });

    const toolbarEl = document.querySelector(".ql-toolbar");
    if (toolbarEl) {
      const titles = {
        ".ql-header": "Nadpis",
        ".ql-bold": "Tučné",
        ".ql-italic": "Kurzíva",
        ".ql-underline": "Podtržené",
        ".ql-strike": "Přeškrtnuté",
        ".ql-color": "Barva textu",
        ".ql-background": "Zvýraznění",
        ".ql-list[value=ordered]": "Číslovaný seznam",
        ".ql-list[value=bullet]": "Odrážky",
        ".ql-list[value=check]": "Checklist (zatržítko)",
        ".ql-code-block": "Blok kódu",
        ".ql-link": "Odkaz",
        ".ql-image": "Vložit obrázek",
        ".ql-clean": "Zrušit formátování"
      };
      Object.entries(titles).forEach(([sel, title]) => {
        toolbarEl.querySelectorAll(sel).forEach(el => el.setAttribute("title", title));
      });
    }
  }

  function handleImageInsert() {
    const input = document.createElement("input");
    input.setAttribute("type", "file");
    input.setAttribute("accept", "image/*");
    input.click();
    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      compressImage(file, (dataUrl) => {
        const range = quill.getSelection(true) || { index: quill.getLength() };
        quill.insertEmbed(range.index, "image", dataUrl, "user");
        quill.setSelection(range.index + 1);
        scheduleSave();
      });
    };
  }

  function compressImage(file, callback) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxW = 900;
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL("image/jpeg", 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ---------- Auth ----------
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUid = user.uid;
      loginScreen.style.display = "none";
      appEl.classList.add("visible");
      initQuill();
      subscribeFolders(user.uid);
      subscribeNotes(user.uid);
    } else {
      currentUid = null;
      loginScreen.style.display = "flex";
      appEl.classList.remove("visible");
      if (unsubNotes) { unsubNotes(); unsubNotes = null; }
      if (unsubFolders) { unsubFolders(); unsubFolders = null; }
    }
  });

    e.preventDefault();
    loginError.textContent = "";
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    try {
      await signInWithEmailAndPassword(auth, email, password);

    }
  });

  logoutBtn.addEventListener("click", () => signOut(auth));

  // ---------- Folders ----------
  async function seedDefaultFolders(uid) {
    const batch = writeBatch(db);
    DEFAULT_FOLDERS.forEach(f => {
      const ref = doc(collection(db, FOLDERS_COL));
      batch.set(ref, { ...f, uid });
    });
    await batch.commit();
  }

  function subscribeFolders(uid) {
    const q = query(collection(db, FOLDERS_COL), where("uid", "==", uid));
    let seeded = false;
    unsubFolders = onSnapshot(q, async (snapshot) => {
      if (snapshot.empty && !seeded) {
        seeded = true;
        await seedDefaultFolders(uid);
        return;
      }
      folders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.nazev || "").localeCompare(b.nazev || "", "cs"));
      renderFolders();
      renderEditorFolderOptions();
      renderNotes();
    });
  }

  function renderFolders() {
    const notesForCounts = visibleNotes();
    const favCount = notesForCounts.filter(n => n.oblibene).length;
    let html = "";
    html += `<div class="folder-row ${view.type === "dashboard" ? "active" : ""}" data-view="dashboard">
      <span class="folder-dot" style="background:#e0a733"></span>
      <span class="folder-name">🏠 Dashboard</span>
      <span class="folder-count">${favCount}</span>
    </div>`;
    html += `<div class="folder-row ${view.type === "all" ? "active" : ""}" data-view="all">
      <span class="folder-dot" style="background:#8a8a8a"></span>
      <span class="folder-name">Všechny poznámky</span>
      <span class="folder-count">${notesForCounts.length}</span>
    </div>`;
    html += `<div class="folder-section-label">Složky</div>`;
    folders.forEach(f => {
      const count = notesForCounts.filter(n => n.druh === f.nazev).length;
      const isActive = view.type === "folder" && view.id === f.id;
      html += `<div class="folder-row ${isActive ? "active" : ""}" data-view="folder" data-id="${f.id}">
        <span class="folder-dot" style="background:${f.barva}"></span>
        <span class="folder-name" data-name-for="${f.id}">${escapeHtml(f.nazev)}</span>
        <span class="folder-count">${count}</span>
        <div class="folder-tools">
          <span style="position:relative;">
            <button class="folder-tool-btn" title="Barva složky" aria-label="Barva složky">🎨</button>
            <input type="color" class="folder-color-input" data-id="${f.id}" value="${f.barva}">
          </span>
          <button class="folder-tool-btn" data-rename="${f.id}" title="Přejmenovat složku" aria-label="Přejmenovat složku">✎</button>
          <button class="folder-tool-btn" data-delete="${f.id}" title="Smazat složku" aria-label="Smazat složku">🗑</button>
        </div>
      </div>`;
    });
    foldersList.innerHTML = html;

    foldersList.querySelectorAll(".folder-row").forEach(row => {
      row.addEventListener("click", (e) => {
        if (e.target.closest(".folder-tools")) return;
        const type = row.dataset.view;
        if (type === "dashboard") selectView({ type: "dashboard" });
        else if (type === "all") selectView({ type: "all" });
        else {
          const f = folders.find(x => x.id === row.dataset.id);
          selectView({ type: "folder", id: f.id, nazev: f.nazev, barva: f.barva });
        }
      });
    });
    foldersList.querySelectorAll(".folder-color-input").forEach(inp => {
      inp.addEventListener("input", async () => {
        await updateDoc(doc(db, FOLDERS_COL, inp.dataset.id), { barva: inp.value });
      });
    });
    foldersList.querySelectorAll("[data-rename]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        startRenameFolder(btn.dataset.rename);
      });
    });
    foldersList.querySelectorAll("[data-delete]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        deleteFolder(btn.dataset.delete);
      });
    });
  }

  function startRenameFolder(id) {
    const span = foldersList.querySelector(`[data-name-for="${id}"]`);
    const f = folders.find(x => x.id === id);
    if (!span || !f) return;
    const input = document.createElement("input");
    input.type = "text";
    input.className = "folder-name-input";
    input.value = f.nazev;
    span.replaceWith(input);
    input.focus();
    input.select();
    const finish = async () => {
      const newName = input.value.trim();
      if (newName && newName !== f.nazev) {
        await renameFolder(f, newName);
      } else {
        renderFolders();
      }
    };
    input.addEventListener("blur", finish);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") input.blur();
      if (e.key === "Escape") { input.value = f.nazev; input.blur(); }
    });
  }

  async function renameFolder(folder, newName) {
    const affected = allNotes.filter(n => n.druh === folder.nazev);
    const batch = writeBatch(db);
    affected.forEach(n => batch.update(doc(db, NOTES_COL, n.id), { druh: newName }));
    batch.update(doc(db, FOLDERS_COL, folder.id), { nazev: newName });
    await batch.commit();
    if (view.type === "folder" && view.id === folder.id) view.nazev = newName;
    showToast("Složka přejmenována");
  }

  async function deleteFolder(id) {
    const f = folders.find(x => x.id === id);
    if (!f) return;
    const count = allNotes.filter(n => n.druh === f.nazev).length;
    if (count > 0) {
      showToast(`Nejprve přesuň nebo smaž ${count} poznámek v této složce`);
      return;
    }
    if (!confirm(`Smazat prázdnou složku "${f.nazev}"?`)) return;
    await deleteDoc(doc(db, FOLDERS_COL, id));
    if (view.type === "folder" && view.id === id) selectView({ type: "all" });
  }

  addFolderBtn.addEventListener("click", () => {
    addFolderPanel.classList.add("visible");
    newFolderName.value = "";
    newFolderName.focus();
  });
  cancelFolderBtn.addEventListener("click", () => addFolderPanel.classList.remove("visible"));
  saveFolderBtn.addEventListener("click", async () => {
    const name = newFolderName.value.trim();
    if (!name) { newFolderName.focus(); return; }
    if (folders.some(f => f.nazev.toLowerCase() === name.toLowerCase())) {
      showToast("Složka s tímto názvem už existuje");
      return;
    }
    const maxPoradi = folders.reduce((m, f) => Math.max(m, f.poradi ?? 0), -1);
    await addDoc(collection(db, FOLDERS_COL), {
      nazev: name, barva: newFolderColor.value, poradi: maxPoradi + 1, uid: currentUid
    });
    addFolderPanel.classList.remove("visible");
    showToast("Složka přidána");
  });

  function renderEditorFolderOptions() {
    editorFolder.innerHTML = folders.map(f => `<option value="${escapeHtml(f.nazev)}">${escapeHtml(f.nazev)}</option>`).join("");
  }

  // ---------- View selection ----------
  function selectView(v) {
    view = v;
    searchInput.value = "";
    updateSearchClearBtn();
    columnsEl.classList.toggle("dashboard-mode", v.type === "dashboard");
    if (v.type === "dashboard") closeEditor();
    renderFolders();
    renderNotes();
    if (window.innerWidth <= 900) columnsEl.dataset.view = "notes";
  }

  // ---------- Notes subscription ----------
  function subscribeNotes(uid) {
    const q = query(collection(db, NOTES_COL), where("uid", "==", uid), orderBy("datum", "desc"));
    unsubNotes = onSnapshot(q, (snapshot) => {
      allNotes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderFolders();
      renderNotes();
      if (selectedNoteId) {
        const still = allNotes.find(n => n.id === selectedNoteId);
        if (!still) closeEditor();
      }
    }, (err) => {
      notesList.innerHTML = `<div class="empty-state">Chyba při načítání: ${err.message}</div>`;
    });
  }

  function currentViewNotes() {
    let list;
    const base = visibleNotes();
    if (view.type === "dashboard") list = base.filter(n => n.oblibene);
    else if (view.type === "all") list = base;
    else list = base.filter(n => n.druh === view.nazev);

    const term = searchInput.value.trim().toLowerCase();
    if (term) {
      list = list.filter(n => {
        const t = (n.nazev || "").toLowerCase();
        const c = stripHtml(n.popis || "").toLowerCase();
        const tags = Array.isArray(n.stitky) ? n.stitky : [];
        const tagMatch = tags.some(tag => tag.toLowerCase().includes(term));
        return t.includes(term) || c.includes(term) || tagMatch;
      });
    }
    return list;
  }

  function renderNotes() {
    if (view.type === "dashboard") { renderDashboardView(); return; }

    if (view.type === "all") notesColTitle.textContent = "Všechny poznámky";
    else notesColTitle.textContent = view.nazev;

    const list = currentViewNotes();
    if (list.length === 0) {
      notesList.innerHTML = `<div class="empty-state">Žádné poznámky.</div>`;
      return;
    }

    notesList.innerHTML = list.map(n => {
      const folder = folderByName(n.druh);
      const color = folder ? folder.barva : "#999";
      const snippet = stripHtml(n.popis || "");
      const title = (n.nazev && n.nazev.trim()) ? n.nazev.trim() : (snippet.slice(0, 40) || "Bez názvu");
      const isActive = n.id === selectedNoteId;
      const tags = Array.isArray(n.stitky) ? n.stitky : [];
      const tagsHtml = tags.length
        ? `<div class="note-row-tags">${tags.map(t => `<span class="tag-pill">#${escapeHtml(t)}</span>`).join("")}</div>`
        : "";
      return `<div class="note-row ${isActive ? "active" : ""}" style="border-left-color:${color}" data-id="${n.id}">
        <button class="note-row-del" data-id="${n.id}" title="Smazat poznámku" aria-label="Smazat poznámku">🗑</button>
        <div class="note-row-top">
          <span class="note-row-badge" style="background:${color}22;color:${color}">${escapeHtml(n.druh || "")}</span>
          <button class="note-row-star ${n.oblibene ? "active" : ""}" data-id="${n.id}" title="Oblíbené" aria-label="Oblíbené">★</button>
        </div>
        <div class="note-row-title">${escapeHtml(title)}</div>
        <div class="note-row-meta">${formatDate(n.datum)}</div>
        <div class="note-row-snippet">${escapeHtml(snippet.slice(0, 70) || "Prázdná poznámka")}</div>
        ${tagsHtml}
      </div>`;
    }).join("");

    notesList.querySelectorAll(".note-row").forEach(row => {
      row.addEventListener("click", (e) => {
        if (e.target.closest(".note-row-del") || e.target.closest(".note-row-star")) return;
        openNote(row.dataset.id);
      });
    });
    notesList.querySelectorAll(".note-row-del").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); deleteNoteRow(btn.dataset.id); });
    });
    notesList.querySelectorAll(".note-row-star").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); toggleFavorite(btn.dataset.id); });
    });
  }

  function renderDashboardView() {
    notesColTitle.textContent = "🏠 Dashboard";
    const favs = visibleNotes().filter(n => n.oblibene);
    if (favs.length === 0) {
      notesList.innerHTML = `<div class="empty-state">Zatím žádné oblíbené poznámky.</div>`;
      return;
    }

    const groups = new Map();
    favs.forEach(n => {
      const key = n.druh || "";
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(n);
    });
    const groupNames = [...groups.keys()].sort((a, b) => a.localeCompare(b, "cs"));

    let html = "";
    groupNames.forEach(name => {
      const notesInGroup = groups.get(name).slice().sort((a, b) => {
        if (a.datum === b.datum) return 0;
        return a.datum < b.datum ? 1 : -1;
      });
      const folder = folderByName(name);
      const color = folder ? folder.barva : "#999";
      html += `<div class="dashboard-group">
        <div class="dashboard-group-label">
          <span class="folder-dot" style="background:${color}"></span>${escapeHtml(name || "Bez složky")}
        </div>
        <div class="dashboard-row">`;
      notesInGroup.forEach(n => {
        const snippet = stripHtml(n.popis || "");
        const title = (n.nazev && n.nazev.trim()) ? n.nazev.trim() : (snippet.slice(0, 40) || "Bez názvu");
        const tags = Array.isArray(n.stitky) ? n.stitky : [];
        const tagsHtml = tags.length
          ? `<div class="note-row-tags">${tags.map(t => `<span class="tag-pill">#${escapeHtml(t)}</span>`).join("")}</div>`
          : "";
        html += `<div class="note-row dashboard-tile" style="border-left-color:${color}" data-id="${n.id}">
          <button class="note-row-del" data-id="${n.id}" title="Smazat poznámku" aria-label="Smazat poznámku">🗑</button>
          <div class="note-row-top">
            <span class="note-row-badge" style="background:${color}22;color:${color}">${escapeHtml(n.druh || "")}</span>
            <button class="note-row-star active" data-id="${n.id}" title="Oblíbené" aria-label="Oblíbené">★</button>
          </div>
          <div class="note-row-title">${escapeHtml(title)}</div>
          <div class="note-row-meta">${formatDate(n.datum)}</div>
          <div class="note-row-snippet">${escapeHtml(snippet.slice(0, 70) || "Prázdná poznámka")}</div>
          ${tagsHtml}
        </div>`;
      });
      html += `</div></div>`;
    });
    notesList.innerHTML = html;

    notesList.querySelectorAll(".dashboard-tile").forEach(tile => {
      tile.addEventListener("click", (e) => {
        if (e.target.closest(".note-row-del") || e.target.closest(".note-row-star")) return;
        goToNoteInFolder(tile.dataset.id);
      });
    });
    notesList.querySelectorAll(".note-row-del").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); deleteNoteRow(btn.dataset.id); });
    });
    notesList.querySelectorAll(".note-row-star").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); toggleFavorite(btn.dataset.id); });
    });
  }

  function goToNoteInFolder(id) {
    const n = allNotes.find(x => x.id === id);
    if (!n) return;
    const f = folderByName(n.druh);
    if (f) selectView({ type: "folder", id: f.id, nazev: f.nazev, barva: f.barva });
    else selectView({ type: "all" });
    openNote(id);
    if (window.innerWidth <= 900) columnsEl.dataset.view = "editor";
  }

  function updateSearchClearBtn() {
    searchClearBtn.classList.toggle("visible", !!searchInput.value);
  }

  searchInput.addEventListener("input", () => {
    updateSearchClearBtn();
    renderNotes();
  });

  searchClearBtn.addEventListener("click", () => {
    searchInput.value = "";
    updateSearchClearBtn();
    renderNotes();
    searchInput.focus();
  });

  async function toggleFavorite(id) {
    const n = allNotes.find(x => x.id === id);
    if (!n) return;
    const newVal = !n.oblibene;

    // Optimisticky aktualizuj lokální stav, ať se hvězdička projeví okamžitě
    // a nečeká se na doručení onSnapshot listeneru.
    allNotes = allNotes.map(x => x.id === id ? { ...x, oblibene: newVal } : x);
    renderFolders();
    renderNotes();
    if (selectedNoteId === id) editorFavBtn.classList.toggle("active", newVal);

    try {
      await updateDoc(doc(db, NOTES_COL, id), { oblibene: newVal });
    } catch (err) {
      // Rollback při chybě zápisu
      allNotes = allNotes.map(x => x.id === id ? { ...x, oblibene: !newVal } : x);
      renderFolders();
      renderNotes();
      if (selectedNoteId === id) editorFavBtn.classList.toggle("active", !newVal);
      showToast("Chyba při ukládání oblíbené poznámky: " + err.message);
    }
  }

  async function deleteNoteRow(id) {
    if (!confirm("Opravdu smazat tuto poznámku?")) return;
    if (pendingDeletes.has(id)) return;
    if (selectedNoteId === id) closeEditor();
    const timeoutId = setTimeout(() => finalizeDeleteNote(id), 5000);
    pendingDeletes.set(id, { timeoutId });
    renderFolders();
    renderNotes();
    showUndoToast("Poznámka smazána", () => undoDeleteNote(id));
  }

  async function finalizeDeleteNote(id) {
    const entry = pendingDeletes.get(id);
    if (!entry) return;
    pendingDeletes.delete(id);
    try {
      await deleteDoc(doc(db, NOTES_COL, id));
    } catch (err) {
      showToast("Chyba při mazání: " + err.message);
      renderFolders();
      renderNotes();
    }
  }

  function undoDeleteNote(id) {
    const entry = pendingDeletes.get(id);
    if (!entry) return;
    clearTimeout(entry.timeoutId);
    pendingDeletes.delete(id);
    renderFolders();
    renderNotes();
    showToast("Smazání zrušeno");
  }

  // ---------- New note ----------
  newNoteBtn.addEventListener("click", async () => {
    let targetFolder;
    if (view.type === "folder") targetFolder = view.nazev;
    else targetFolder = folders[0] ? folders[0].nazev : null;
    if (!targetFolder) { showToast("Nejprve vytvoř složku"); return; }

    const newNoteData = {
      datum: new Date().toISOString().slice(0, 10),
      druh: targetFolder,
      nazev: "",
      popis: "",
      oblibene: false,
      stitky: [],
      uid: currentUid,
      vytvoreno: serverTimestamp(),
      upraveno: serverTimestamp()
    };

    let ref;
    try {
      ref = await addDoc(collection(db, NOTES_COL), newNoteData);
    } catch (err) {
      showToast("Chyba při vytváření poznámky: " + err.message);
      return;
    }

    // Optimisticky přidej poznámku do lokálního stavu hned, ať se editor
    // otevře okamžitě a nečeká se na doručení onSnapshot listeneru.
    if (!allNotes.some(n => n.id === ref.id)) {
      allNotes = [{ id: ref.id, ...newNoteData }, ...allNotes];
    }

    if (view.type !== "folder") {
      const f = folderByName(targetFolder);
      selectView({ type: "folder", id: f.id, nazev: f.nazev, barva: f.barva });
    }
    openNote(ref.id);
    if (window.innerWidth <= 900) columnsEl.dataset.view = "editor";
    setTimeout(() => editorTitle.focus(), 150);
  });

  // ---------- Editor ----------
  function openNote(id) {
    const n = allNotes.find(x => x.id === id);
    if (!n) return;
    selectedNoteId = id;
    editorEmpty.style.display = "none";
    editorWrap.classList.add("visible");

    suppressAutosave = true;
    editorFolder.value = n.druh || "";
    editorDate.value = n.datum || "";
    editorTitle.value = n.nazev || "";
    editorFavBtn.classList.toggle("active", !!n.oblibene);
    currentTags = Array.isArray(n.stitky) ? [...n.stitky] : [];
    renderTagChips();
    tagInput.value = "";

    let html = n.popis || "";
    if (html && !/<[a-z][\s\S]*>/i.test(html)) {
      html = "<p>" + escapeHtml(html).replace(/\n/g, "<br>") + "</p>";
    }
    quill.root.innerHTML = html;
    saveStatus.textContent = "Uloženo";
    editedStatus.textContent = n.upraveno && n.upraveno.toDate ? ("Upraveno " + n.upraveno.toDate().toLocaleString("cs-CZ")) : "";
    suppressAutosave = false;

    renderNotes();
    if (window.innerWidth <= 900) columnsEl.dataset.view = "editor";
  }

  function closeEditor() {
    selectedNoteId = null;
    currentTags = [];
    editorEmpty.style.display = "flex";
    editorWrap.classList.remove("visible");
    renderNotes();
    if (window.innerWidth <= 900 && columnsEl.dataset.view === "editor") {
      columnsEl.dataset.view = "notes";
    }
  }

  // ---------- Tags ----------
  function renderTagChips() {
    tagChips.innerHTML = currentTags.map(t => `<span class="tag-chip">#${escapeHtml(t)}<button data-tag="${escapeHtml(t)}" title="Odebrat">×</button></span>`).join("");
    tagChips.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        currentTags = currentTags.filter(t => t !== btn.dataset.tag);
        renderTagChips();
        scheduleSave();
      });
    });
  }

  function addTagFromInput() {
    const raw = tagInput.value.trim().replace(/^#/, "");
    if (!raw) return;
    const exists = currentTags.some(t => t.toLowerCase() === raw.toLowerCase());
    if (!exists) currentTags.push(raw);
    tagInput.value = "";
    renderTagChips();
    scheduleSave();
  }

  tagInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      addTagFromInput();
    }
  });
  tagInput.addEventListener("blur", () => {
    if (tagInput.value.trim()) addTagFromInput();
  });

  editorFolder.addEventListener("change", () => scheduleSave());
  editorDate.addEventListener("change", () => scheduleSave());
  editorTitle.addEventListener("input", () => scheduleSave());

  editorFavBtn.addEventListener("click", () => {
    if (!selectedNoteId) return;
    toggleFavorite(selectedNoteId);
  });

  editorDeleteBtn.addEventListener("click", () => {
    if (!selectedNoteId) return;
    deleteNoteRow(selectedNoteId);
  });

  function scheduleSave() {
    saveStatus.textContent = "Ukládání…";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveCurrentNote, 700);
  }

  async function saveCurrentNote() {
    if (!selectedNoteId) return;
    try {
      await updateDoc(doc(db, NOTES_COL, selectedNoteId), {
        druh: editorFolder.value,
        datum: editorDate.value,
        nazev: editorTitle.value,
        popis: quill.root.innerHTML,
        stitky: currentTags,
        upraveno: serverTimestamp()
      });
      saveStatus.textContent = "Uloženo";
      editedStatus.textContent = "Upraveno " + new Date().toLocaleString("cs-CZ");
    } catch (err) {
      saveStatus.textContent = "Chyba při ukládání";
      showToast("Chyba: " + err.message);
    }
  }

  // ---------- Mobile nav ----------
  backToFolders.addEventListener("click", () => columnsEl.dataset.view = "folders");
  backToNotes.addEventListener("click", () => columnsEl.dataset.view = "notes");

  // ---------- PDF export ----------
  exportPdfBtn.addEventListener("click", () => {
    if (currentViewNotes().length === 0) { showToast("Není co exportovat"); return; }
    pdfFromDate.value = "";
    pdfToDate.value = "";
    pdfRangeModal.classList.add("visible");
    setTimeout(() => pdfFromDate.focus(), 50);
  });

  pdfCancelBtn.addEventListener("click", () => pdfRangeModal.classList.remove("visible"));
  pdfRangeModal.addEventListener("click", (e) => {
    if (e.target === pdfRangeModal) pdfRangeModal.classList.remove("visible");
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && pdfRangeModal.classList.contains("visible")) {
      pdfRangeModal.classList.remove("visible");
    }
  });

  pdfConfirmBtn.addEventListener("click", () => {
    const from = pdfFromDate.value;
    const to = pdfToDate.value;
    if (from && to && from > to) { showToast("Datum „Od“ je později než „Do“"); return; }
    pdfRangeModal.classList.remove("visible");
    runPdfExport(from, to);
  });

  function runPdfExport(from, to) {
    let list = [...currentViewNotes()];
    if (from) list = list.filter(n => n.datum >= from);
    if (to) list = list.filter(n => n.datum <= to);
    list.sort((a, b) => (a.datum < b.datum ? 1 : -1));
    if (list.length === 0) { showToast("V daném rozsahu nejsou žádné poznámky"); return; }
    const printArea = document.getElementById("printArea");
    let html = `<div class="print-folder-title">${escapeHtml(notesColTitle.textContent)}</div>`;
    list.forEach(n => {
      const title = (n.nazev && n.nazev.trim()) ? n.nazev.trim() : "Bez názvu";
      html += `<div class="print-note">
        <div class="print-title">${escapeHtml(title)}</div>
        <div class="print-meta">${formatDate(n.datum)} · ${escapeHtml(n.druh || "")}</div>
        <div class="print-content">${n.popis || ""}</div>
      </div>`;
    });
    printArea.innerHTML = html;
    document.body.classList.add("printing");
    setTimeout(() => window.print(), 50);
  }

  window.addEventListener("afterprint", () => {
    document.body.classList.remove("printing");
  });

  // ---------- JSON backup export ----------
  jsonExportBtn.addEventListener("click", () => {
    if (allNotes.length === 0) { showToast("Není co exportovat"); return; }
    const sorted = [...allNotes].sort((a, b) => (a.datum < b.datum ? 1 : -1));
    const exportData = sorted.map(n => ({
      datum: n.datum, druh: n.druh, nazev: n.nazev || "", popis: n.popis, oblibene: !!n.oblibene, stitky: n.stitky || []
    }));
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `vtipnici-export-${today}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Export stažen");
  });

  // ---------- Import textu z webu (typicky recepty) ----------
  const CORS_PROXY = "https://api.allorigins.win/raw?url=";

  importUrlBtn.addEventListener("click", () => importFromWeb());
  importUrlInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); importFromWeb(); }
  });

  async function importFromWeb() {
    const raw = importUrlInput.value.trim();
    if (!raw) { importUrlInput.focus(); return; }
    let parsed;
    try {
      parsed = new URL(raw);
    } catch {
      showToast("Neplatná webová adresa");
      return;
    }
    if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
      showToast("Podporované jsou jen http/https odkazy");
      return;
    }

    importUrlBtn.disabled = true;
    importStatus.textContent = "Načítám…";
    try {
      const res = await fetch(CORS_PROXY + encodeURIComponent(parsed.href));
      if (!res.ok) throw new Error("stránka odpověděla chybou " + res.status);
      const html = await res.text();
      const extracted = extractContentFromHtml(html);
      insertImportedContent(extracted, parsed.href);
      importStatus.textContent = "Načteno ✓";
      setTimeout(() => { importStatus.textContent = ""; }, 3000);
    } catch (err) {
      importStatus.textContent = "";
      showToast("Nepodařilo se načíst stránku (" + err.message + ")");
    } finally {
      importUrlBtn.disabled = false;
    }
  }

  function textOfLdField(val) {
    if (!val) return "";
    if (typeof val === "string") return val;
    if (Array.isArray(val)) return val.map(textOfLdField).join(" ");
    if (typeof val === "object") return val.text || val.name || "";
    return String(val);
  }

  function buildRecipeResult(item) {
    const name = textOfLdField(item.name) || "";
    const ingredients = Array.isArray(item.recipeIngredient) ? item.recipeIngredient
                       : Array.isArray(item.ingredients) ? item.ingredients : [];
    let instructions = [];
    if (Array.isArray(item.recipeInstructions)) {
      instructions = item.recipeInstructions.map(step => {
        if (typeof step === "string") return step;
        if (step.itemListElement) return textOfLdField(step.itemListElement);
        return textOfLdField(step.text || step.name);
      }).filter(Boolean);
    } else if (typeof item.recipeInstructions === "string") {
      instructions = item.recipeInstructions.split(/\n+/).map(s => s.trim()).filter(Boolean);
    }
    return { title: name, ingredients, instructions, isRecipe: true };
  }

  function findRecipeJsonLd(doc) {
    const scripts = doc.querySelectorAll('script[type="application/ld+json"]');
    for (const s of scripts) {
      let data;
      try { data = JSON.parse(s.textContent); } catch { continue; }
      const items = Array.isArray(data) ? data : (Array.isArray(data["@graph"]) ? data["@graph"] : [data]);
      for (const item of items) {
        if (!item || !item["@type"]) continue;
        const types = Array.isArray(item["@type"]) ? item["@type"] : [item["@type"]];
        if (types.includes("Recipe")) return buildRecipeResult(item);
      }
    }
    return null;
  }

  function findRecipeMicrodata(doc) {
    const ingredientEls = doc.querySelectorAll('[itemprop="recipeIngredient"], [itemprop="ingredients"]');
    const instructionEls = doc.querySelectorAll('[itemprop="recipeInstructions"]');
    if (!ingredientEls.length && !instructionEls.length) return null;
    const nameEl = doc.querySelector('[itemprop="name"]');
    const ingredients = [...ingredientEls].map(el => el.textContent.trim()).filter(Boolean);
    let instructions = [];
    instructionEls.forEach(el => {
      const steps = el.querySelectorAll("li, p");
      if (steps.length) instructions.push(...[...steps].map(s => s.textContent.trim()).filter(Boolean));
      else {
        const t = el.textContent.trim();
        if (t) instructions.push(t);
      }
    });
    return { title: nameEl ? nameEl.textContent.trim() : "", ingredients, instructions, isRecipe: true };
  }

  function extractGenericText(doc) {
    doc.querySelectorAll("script, style, nav, header, footer, aside, noscript, form, iframe").forEach(el => el.remove());
    const titleEl = doc.querySelector("h1") || doc.querySelector("title");
    const title = titleEl ? titleEl.textContent.trim() : "";
    const root = doc.querySelector("article") || doc.querySelector("main") || doc.body;
    const paragraphs = root ? [...root.querySelectorAll("p, li")]
      .map(el => el.textContent.replace(/\s+/g, " ").trim())
      .filter(t => t.length > 20) : [];
    const text = paragraphs.slice(0, 60).join("\n\n");
    return { title, text, isRecipe: false };
  }

  function extractContentFromHtml(html) {
    const doc = new DOMParser().parseFromString(html, "text/html");
    return findRecipeJsonLd(doc) || findRecipeMicrodata(doc) || extractGenericText(doc);
  }

  function insertImportedContent(data, sourceUrl) {
    if (!editorTitle.value.trim() && data.title) {
      editorTitle.value = data.title;
      scheduleSave();
    }

    let html = "";
    if (data.isRecipe) {
      if (data.ingredients && data.ingredients.length) {
        html += "<h3>Ingredience</h3><ul>" + data.ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join("") + "</ul>";
      }
      if (data.instructions && data.instructions.length) {
        html += "<h3>Postup</h3><ol>" + data.instructions.map(i => `<li>${escapeHtml(i)}</li>`).join("") + "</ol>";
      }
      if (!html) html = "<p>Nepodařilo se rozpoznat ingredience ani postup, zkus obecné načtení textu.</p>";
    } else if (data.text) {
      html = data.text.split("\n\n").map(p => `<p>${escapeHtml(p)}</p>`).join("");
    } else {
      html = "<p>Ze stránky se nepodařilo získat žádný čitelný text.</p>";
    }
    html += `<p><em>Zdroj: <a href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(sourceUrl)}</a></em></p>`;

    const len = quill.getLength();
    quill.clipboard.dangerouslyPasteHTML(len > 1 ? len - 1 : 0, html, "user");
    scheduleSave();
    importUrlInput.value = "";
  }
</script>
</body>
</html>
