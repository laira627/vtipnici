<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rychlý zápis — Vtipníci</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Zápis">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#dceefb">
<style>
  :root {
    --bg: #dceefb;
    --paper: #ffffff;
    --ink: #2b2620;
    --ink-soft: #6b6155;
    --line: #e3e9ef;
    --accent: #3d6fa8;
    --accent-dark: #2c527f;
    --accent-soft: #e5eefa;
    --shadow: 0 1px 3px rgba(43,38,32,0.06), 0 4px 16px rgba(43,38,32,0.05);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 100%;
  }
  input, select, textarea, button { font-family: inherit; }

  .card {
    background: var(--paper);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow);
  }
  h1 { font-size: 20px; margin: 0 0 4px; font-weight: 700; text-align: center; }
  p.sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 22px; text-align: center; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink-soft); }
  input[type=email], input[type=password], input[type=date], select, textarea {
    width: 100%;
    padding: 13px 14px;
    border-radius: 11px;
    border: 1.5px solid var(--line);
    font-size: 16px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 110px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--accent); color: #fff; border: none; padding: 14px 20px;
    border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
    width: 100%; margin-top: 4px;
  }
  .btn:active { background: var(--accent-dark); transform: scale(0.98); }

  .link-row { text-align: center; margin-top: 16px; }
  .link-row a { color: var(--ink-soft); font-size: 13px; text-decoration: none; }
  .link-row a:hover { color: var(--accent-dark); }

  #loginError { color: #b3261e; font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 10px;
    font-size: 14.5px; font-weight: 600; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; z-index: 200;
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  #entryScreen { display: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginScreen">
  <h1>📓 Rychlý zápis</h1>
  <p class="sub">Přihlaš se jednou, appka si tě pak pamatuje</p>
  <form id="loginForm">
    <div class="field">
      <label for="loginEmail">E-mail</label>
      <input type="email" id="loginEmail" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="loginPassword">Heslo</label>
      <input type="password" id="loginPassword" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Přihlásit se</button>
    <div id="loginError"></div>
  </form>
</div>

<!-- QUICK ENTRY -->
<div class="card" id="entryScreen">
  <h1>📓 Rychlý zápis</h1>
  <p class="sub">Zadej poznámku a ulož jedním klepnutím</p>
  <form id="entryForm">
    <div class="row2">
      <div class="field">
        <label for="datum">Datum</label>
        <input type="date" id="datum" required>
      </div>
      <div class="field">
        <label for="druh">Druh</label>
        <select id="druh" required></select>
      </div>
    </div>
    <div class="field">
      <label for="nazev">Název</label>
      <input type="text" id="nazev" placeholder="Název poznámky (nepovinné)">
    </div>
    <div class="field">
      <label for="popis">Popis</label>
      <textarea id="popis" required placeholder="Napiš, co se stalo…" autofocus></textarea>
    </div>
    <div class="field">
      <label for="stitky">Štítky</label>
      <input type="text" id="stitky" placeholder="oddělené čárkou, např. výlet, vtip">
    </div>
    <button type="submit" class="btn">Uložit záznam</button>
  </form>
  <div class="link-row">
    <a href="index.html">Otevřít celou aplikaci →</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCeOsvSECUhxjCQ7y2fFv3ybkxw2vsHwEo",
    authDomain: "vtipnici.firebaseapp.com",
    projectId: "vtipnici",
    storageBucket: "vtipnici.firebasestorage.app",
    messagingSenderId: "803980056829",
    appId: "1:803980056829:web:1358b51db8b3e706e50694"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const NOTES_COL = "poznamky";
  const FOLDERS_COL = "slozky";
  const FALLBACK_DRUHY = ["Hláška", "Kino", "Kniha", "Kultura", "Myšlenka", "Lékaři", "Tipy"];
  const DEFAULT_DRUH = "ToDo";

  const loginScreen = document.getElementById("loginScreen");
  const entryScreen = document.getElementById("entryScreen");
  const loginForm = document.getElementById("loginForm");
  const loginError = document.getElementById("loginError");
  const entryForm = document.getElementById("entryForm");
  const datumEl = document.getElementById("datum");
  const druhEl = document.getElementById("druh");
  const nazevEl = document.getElementById("nazev");
  const popisEl = document.getElementById("popis");
  const stitkyEl = document.getElementById("stitky");
  const toast = document.getElementById("toast");

  let currentUid = null;
  let unsubFolders = null;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("visible");
    setTimeout(() => toast.classList.remove("visible"), 2000);
  }

  function resetDate() {
    datumEl.value = new Date().toISOString().slice(0, 10);
  }

  await setPersistence(auth, browserLocalPersistence).catch(() => {});

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUid = user.uid;
      loginScreen.style.display = "none";
      entryScreen.style.display = "block";
      resetDate();
      subscribeFolders(user.uid);
      setTimeout(() => popisEl.focus(), 200);
    } else {
      currentUid = null;
      loginScreen.style.display = "block";
      entryScreen.style.display = "none";
      if (unsubFolders) { unsubFolders(); unsubFolders = null; }
    }
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginError.textContent = "";
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      loginError.textContent = "Nesprávný e-mail nebo heslo.";
    }
  });

  function subscribeFolders(uid) {
    const q = query(collection(db, FOLDERS_COL), where("uid", "==", uid));
    let firstLoad = true;
    unsubFolders = onSnapshot(q, (snapshot) => {
      let names;
      if (snapshot.empty) {
        names = FALLBACK_DRUHY;
      } else {
        names = snapshot.docs.map(d => d.data()).map(f => f.nazev);
      }
      names = [...names].sort((a, b) => a.localeCompare(b, "cs"));
      const prevValue = druhEl.value;
      druhEl.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join("");
      if (firstLoad && names.includes(DEFAULT_DRUH)) {
        druhEl.value = DEFAULT_DRUH;
      } else if (names.includes(prevValue)) {
        druhEl.value = prevValue;
      }
      firstLoad = false;
    });
  }

  entryForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const datum = datumEl.value;
    const druh = druhEl.value;
    const nazev = nazevEl.value.trim();
    const popis = popisEl.value.trim();
    const stitky = stitkyEl.value
      .split(",")
      .map(t => t.trim().replace(/^#/, ""))
      .filter(Boolean);
    if (!datum || !druh || !popis) return;

    try {
      await addDoc(collection(db, NOTES_COL), {
        datum, druh, popis, nazev, stitky,
        oblibene: false,
        uid: currentUid,
        vytvoreno: serverTimestamp(),
        upraveno: serverTimestamp()
      });
      nazevEl.value = "";
      popisEl.value = "";
      stitkyEl.value = "";
      resetDate();
      popisEl.focus();
      showToast("Uloženo ✓");
    } catch (err) {
      showToast("Chyba: " + err.message);
    }
  });
</script>
</body>
</html>
