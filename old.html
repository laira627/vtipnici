<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vtipníci — osobní poznámky</title>
<style>
  :root {
    --bg: #faf7f2;
    --paper: #ffffff;
    --ink: #2b2620;
    --ink-soft: #6b6155;
    --line: #e8e1d6;
    --accent: #b5502f;
    --accent-soft: #f2e3da;
    --accent-dark: #8a3d23;
    --shadow: 0 1px 3px rgba(43,38,32,0.06), 0 4px 16px rgba(43,38,32,0.05);

    --c-hlaska: #b5502f;
    --c-hlaska-bg: #fbeee8;
    --c-kino: #3d5a80;
    --c-kino-bg: #e8eef5;
    --c-kniha: #5f7a3d;
    --c-kniha-bg: #edf2e5;
    --c-kultura: #8a5ea8;
    --c-kultura-bg: #f2eaf6;
    --c-myslenka: #b8873a;
    --c-myslenka-bg: #faf1e2;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ---------- Login screen ---------- */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: var(--paper);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .login-card h1 {
    font-size: 26px;
    margin: 0 0 6px;
    font-weight: 700;
  }

  .login-card p.sub {
    color: var(--ink-soft);
    font-size: 14px;
    margin: 0 0 28px;
  }

  input, select, textarea, button {
    font-family: inherit;
  }

  .field {
    text-align: left;
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--ink-soft);
  }

  input[type=email], input[type=password], input[type=date], select, textarea {
    width: 100%;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    font-size: 15px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color .15s;
  }

  input[type=email]:focus, input[type=password]:focus, input[type=date]:focus,
  select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 70px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
    width: 100%;
  }
  .btn:hover { background: var(--accent-dark); }
  .btn:active { transform: scale(0.98); }

  .btn-secondary {
    background: transparent;
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
  }
  .btn-secondary:hover { background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent-soft); }

  #loginError {
    color: #b3261e;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }

  /* ---------- App shell ---------- */
  #app { display: none; }
  #app.visible { display: block; }

  header {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 19px;
    margin: 0;
    font-weight: 700;
  }

  header .header-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--ink-soft);
    border-radius: 9px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .icon-btn:hover { background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent-soft); }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* ---------- Add form ---------- */
  .card-panel {
    background: var(--paper);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .card-panel h2 {
    font-size: 15px;
    margin: 0 0 16px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }
  .form-actions .btn { width: auto; flex: 1; }

  /* ---------- Filter tabs ---------- */
  .tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 18px;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 0 0 auto;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    color: var(--ink-soft);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ---------- Notes list ---------- */
  .note-card {
    background: var(--paper);
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    border-left: 4px solid var(--accent);
  }

  .note-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .note-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-size: 11.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .03em;
  }

  .note-date {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 600;
  }

  .note-desc {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .note-actions {
    display: flex;
    gap: 6px;
  }

  .mini-btn {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 6px;
    font-weight: 600;
  }
  .mini-btn:hover { background: var(--accent-soft); color: var(--accent-dark); }
  .mini-btn.danger:hover { background: #fce8e6; color: #b3261e; }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    padding: 40px 20px;
    font-size: 14px;
  }

  /* per-category colors */
  .note-card[data-druh="Hláška"] { border-left-color: var(--c-hlaska); }
  .note-card[data-druh="Kino"] { border-left-color: var(--c-kino); }
  .note-card[data-druh="Kniha"] { border-left-color: var(--c-kniha); }
  .note-card[data-druh="Kultura"] { border-left-color: var(--c-kultura); }
  .note-card[data-druh="Myšlenka"] { border-left-color: var(--c-myslenka); }

  .badge[data-druh="Hláška"] { background: var(--c-hlaska-bg); color: var(--c-hlaska); }
  .badge[data-druh="Kino"] { background: var(--c-kino-bg); color: var(--c-kino); }
  .badge[data-druh="Kniha"] { background: var(--c-kniha-bg); color: var(--c-kniha); }
  .badge[data-druh="Kultura"] { background: var(--c-kultura-bg); color: var(--c-kultura); }
  .badge[data-druh="Myšlenka"] { background: var(--c-myslenka-bg); color: var(--c-myslenka); }

  /* ---------- Modal (edit) ---------- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(43,38,32,0.45);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--paper);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
  }

  .modal h3 { margin: 0 0 16px; font-size: 17px; }

  .modal .form-actions { margin-top: 18px; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 11px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 200;
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  .loading-msg {
    text-align: center;
    color: var(--ink-soft);
    padding: 30px;
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>📓 Vtipníci</h1>
    <p class="sub">Osobní zápisník hlášek, filmů, knih a myšlenek</p>
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="loginPassword">Heslo</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Přihlásit se</button>
      <div id="loginError"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>📓 Vtipníci</h1>
    <div class="header-actions">
      <button class="icon-btn" id="exportBtn">⬇ Export</button>
      <button class="icon-btn" id="logoutBtn">Odhlásit</button>
    </div>
  </header>

  <main>
    <div class="card-panel">
      <h2>Nový záznam</h2>
      <form id="noteForm">
        <div class="form-row">
          <div class="field">
            <label for="datum">Datum</label>
            <input type="date" id="datum" required>
          </div>
          <div class="field">
            <label for="druh">Druh</label>
            <select id="druh" required>
              <option value="Hláška">Hláška</option>
              <option value="Kino">Kino</option>
              <option value="Kniha">Kniha</option>
              <option value="Kultura">Kultura</option>
              <option value="Myšlenka">Myšlenka</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="popis">Popis</label>
          <textarea id="popis" required placeholder="Napiš, co se stalo…"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn">Uložit záznam</button>
        </div>
      </form>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-filter="Vše">Vše</button>
      <button class="tab" data-filter="Hláška">Hláška</button>
      <button class="tab" data-filter="Kino">Kino</button>
      <button class="tab" data-filter="Kniha">Kniha</button>
      <button class="tab" data-filter="Kultura">Kultura</button>
      <button class="tab" data-filter="Myšlenka">Myšlenka</button>
    </div>

    <div id="notesList">
      <div class="loading-msg">Načítám záznamy…</div>
    </div>
  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editOverlay">
  <div class="modal">
    <h3>Upravit záznam</h3>
    <form id="editForm">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="field">
          <label for="editDatum">Datum</label>
          <input type="date" id="editDatum" required>
        </div>
        <div class="field">
          <label for="editDruh">Druh</label>
          <select id="editDruh" required>
            <option value="Hláška">Hláška</option>
            <option value="Kino">Kino</option>
            <option value="Kniha">Kniha</option>
            <option value="Kultura">Kultura</option>
            <option value="Myšlenka">Myšlenka</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="editPopis">Popis</label>
        <textarea id="editPopis" required></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="editCancel">Zrušit</button>
        <button type="submit" class="btn">Uložit změny</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
    query, where, orderBy, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCeOsvSECUhxjCQ7y2fFv3ybkxw2vsHwEo",
    authDomain: "vtipnici.firebaseapp.com",
    projectId: "vtipnici",
    storageBucket: "vtipnici.firebasestorage.app",
    messagingSenderId: "803980056829",
    appId: "1:803980056829:web:1358b51db8b3e706e50694"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const COLLECTION = "poznamky";

  // ---------- Elements ----------
  const loginScreen = document.getElementById("loginScreen");
  const appEl = document.getElementById("app");
  const loginForm = document.getElementById("loginForm");
  const loginError = document.getElementById("loginError");
  const logoutBtn = document.getElementById("logoutBtn");
  const exportBtn = document.getElementById("exportBtn");
  const noteForm = document.getElementById("noteForm");
  const notesList = document.getElementById("notesList");
  const tabsEl = document.getElementById("tabs");
  const toast = document.getElementById("toast");

  const editOverlay = document.getElementById("editOverlay");
  const editForm = document.getElementById("editForm");
  const editCancel = document.getElementById("editCancel");

  let currentFilter = "Vše";
  let allNotes = [];
  let unsubscribe = null;
  let currentUid = null;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("visible");
    setTimeout(() => toast.classList.remove("visible"), 2200);
  }

  // ---------- Auth ----------
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUid = user.uid;
      loginScreen.style.display = "none";
      appEl.classList.add("visible");
      subscribeNotes(user.uid);
    } else {
      currentUid = null;
      loginScreen.style.display = "flex";
      appEl.classList.remove("visible");
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    }
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginError.textContent = "";
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      loginError.textContent = "Nesprávný e-mail nebo heslo.";
    }
  });

  logoutBtn.addEventListener("click", () => signOut(auth));

  // ---------- Notes subscription ----------
  function subscribeNotes(uid) {
    const q = query(
      collection(db, COLLECTION),
      where("uid", "==", uid),
      orderBy("datum", "desc")
    );
    unsubscribe = onSnapshot(q, (snapshot) => {
      allNotes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderNotes();
    }, (err) => {
      notesList.innerHTML = `<div class="empty-state">Chyba při načítání: ${err.message}</div>`;
    });
  }

  function renderNotes() {
    const filtered = currentFilter === "Vše"
      ? allNotes
      : allNotes.filter(n => n.druh === currentFilter);

    if (filtered.length === 0) {
      notesList.innerHTML = `<div class="empty-state">Zatím žádné záznamy.</div>`;
      return;
    }

    notesList.innerHTML = filtered.map(n => `
      <div class="note-card" data-druh="${escapeHtml(n.druh)}" data-id="${n.id}">
        <div class="note-top">
          <div class="note-meta">
            <span class="badge" data-druh="${escapeHtml(n.druh)}">${escapeHtml(n.druh)}</span>
            <span class="note-date">${formatDate(n.datum)}</span>
          </div>
          <div class="note-actions">
            <button class="mini-btn edit-btn" data-id="${n.id}">Upravit</button>
            <button class="mini-btn danger delete-btn" data-id="${n.id}">Smazat</button>
          </div>
        </div>
        <div class="note-desc">${escapeHtml(n.popis)}</div>
      </div>
    `).join("");

    document.querySelectorAll(".edit-btn").forEach(btn => {
      btn.addEventListener("click", () => openEdit(btn.dataset.id));
    });
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", () => deleteNote(btn.dataset.id));
    });
  }

  function formatDate(isoDate) {
    if (!isoDate) return "";
    const [y, m, d] = isoDate.split("-");
    return `${d}.${m}.${y}`;
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  // ---------- Tabs ----------
  tabsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    tabsEl.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderNotes();
  });

  // ---------- Add note ----------
  noteForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const datum = document.getElementById("datum").value;
    const druh = document.getElementById("druh").value;
    const popis = document.getElementById("popis").value.trim();
    if (!datum || !druh || !popis) return;

    try {
      await addDoc(collection(db, COLLECTION), {
        datum, druh, popis,
        uid: currentUid,
        vytvoreno: serverTimestamp()
      });
      noteForm.reset();
      showToast("Záznam uložen");
    } catch (err) {
      showToast("Chyba: " + err.message);
    }
  });

  // ---------- Edit ----------
  function openEdit(id) {
    const n = allNotes.find(x => x.id === id);
    if (!n) return;
    document.getElementById("editId").value = id;
    document.getElementById("editDatum").value = n.datum;
    document.getElementById("editDruh").value = n.druh;
    document.getElementById("editPopis").value = n.popis;
    editOverlay.classList.add("visible");
  }

  editCancel.addEventListener("click", () => editOverlay.classList.remove("visible"));
  editOverlay.addEventListener("click", (e) => {
    if (e.target === editOverlay) editOverlay.classList.remove("visible");
  });

  editForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("editId").value;
    const datum = document.getElementById("editDatum").value;
    const druh = document.getElementById("editDruh").value;
    const popis = document.getElementById("editPopis").value.trim();

    try {
      await updateDoc(doc(db, COLLECTION, id), { datum, druh, popis });
      editOverlay.classList.remove("visible");
      showToast("Změny uloženy");
    } catch (err) {
      showToast("Chyba: " + err.message);
    }
  });

  // ---------- Delete ----------
  async function deleteNote(id) {
    if (!confirm("Opravdu smazat tento záznam?")) return;
    try {
      await deleteDoc(doc(db, COLLECTION, id));
      showToast("Záznam smazán");
    } catch (err) {
      showToast("Chyba: " + err.message);
    }
  }

  // ---------- Export ----------
  exportBtn.addEventListener("click", () => {
    if (allNotes.length === 0) {
      showToast("Není co exportovat");
      return;
    }
    const sorted = [...allNotes].sort((a, b) => (a.datum < b.datum ? 1 : -1));
    const exportData = sorted.map(n => ({
      datum: n.datum, druh: n.druh, popis: n.popis
    }));
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `vtipnici-export-${today}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Export stažen");
  });

  // Prefill today's date in the add form
  document.getElementById("datum").value = new Date().toISOString().slice(0, 10);
</script>

</body>
</html>
